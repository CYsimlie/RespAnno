name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: respanno

      - name: Install test dependencies
        shell: bash -el {0}
        run: pip install pytest-cov pytest-timeout

      - name: Run tests
        shell: bash -el {0}
        run: python -m pytest tests -q --tb=short --cov=respanno --cov-report=term --cov-report=xml --timeout=300

      - name: Run ML demo
        shell: bash -el {0}
        run: python scripts/ml_demo.py
